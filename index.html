<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Visualizer</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/canvas.css">
    <link rel="stylesheet" href="css/statusbar.css">
</head>

<body>

    <header>
        <span class="logo">&lt;/&gt;</span>
        <h1>HTML Visualizer</h1>
    </header>

    <div class="main">

        <div class="sidebar">

            <div class="card">
                <h3>HTML Input</h3>
                <textarea id="input" placeholder="Paste your HTML here..."></textarea>
                <div class="btn-row">
                    <button class="btn-primary" onclick="buildTree()">Visualize</button>
                    <button class="btn-secondary" onclick="resetView()">Reset</button>
                </div>
            </div>

            <div class="card">
                <h3>Stats</h3>
                <div class="stats">
                    <div class="stat-box">
                        <div class="val" id="stat-nodes">0</div>
                        <div class="lbl">Nodes</div>
                    </div>
                    <div class="stat-box">
                        <div class="val" id="stat-edges">0</div>
                        <div class="lbl">Edges</div>
                    </div>
                    <div class="stat-box">
                        <div class="val" id="stat-depth">0</div>
                        <div class="lbl">Depth</div>
                    </div>
                    <div class="stat-box">
                        <div class="val" id="stat-leaves">0</div>
                        <div class="lbl">Leaves</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="hint">
                    Drag to pan · Scroll to zoom<br>
                    Hover nodes · Drag nodes to move
                </div>
            </div>

        </div>

        <div class="canvas-wrap">
            <canvas id="canvas" width="950" height="600"></canvas>
            <div class="canvas-overlay">
                <div class="icon-btn" title="Zoom In" onclick="zoomAt(1.2)">+</div>
                <div class="icon-btn" title="Zoom Out" onclick="zoomAt(0.83)">−</div>
                <div class="icon-btn" title="Fit" onclick="resetView()">⤢</div>
            </div>
            <div class="tooltip" id="tooltip"></div>
        </div>

    </div>

    <div class="status-bar">
        <span>
            <div class="dot-live"></div> Ready
        </span>
        <span id="zoom-label">Zoom: 100%</span>
        <span id="hover-label">Hover a node</span>
    </div>

    <script src="js/html_parse.js"></script>
    <script src="js/state.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/draw.js"></script>
    <script src="js/viewport.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/interaction.js"></script>

</body>

</html>
